<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clem's Walk Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:     #F7F3EC;
    --paper:     #FFFDF8;
    --bark:      #3D2B1F;
    --bark-mid:  #6B4C3B;
    --bark-lite: #A07860;
    --moss:      #4A6741;
    --moss-lite: #D4E8D0;
    --sky:       #3A6186;
    --sky-lite:  #D0E4F5;
    --amber:     #C8841A;
    --amber-lite:#FDE8C0;
    --coral:     #C0513A;
    --coral-lite:#FAD9D2;
    --border:    rgba(61,43,31,0.12);
    --shadow:    0 2px 12px rgba(61,43,31,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--bark);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--bark);
    color: var(--cream);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .header-left h1 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .header-left p { font-size: 0.8rem; opacity: 0.6; margin-top: 2px; }
  .header-nav { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost { background: transparent; border-color: rgba(247,243,236,0.3); color: var(--cream); }
  .btn-ghost:hover { background: rgba(247,243,236,0.1); border-color: rgba(247,243,236,0.6); }
  .btn-primary { background: var(--moss); border-color: var(--moss); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-danger { background: var(--coral); border-color: var(--coral); color: #fff; }
  .btn-danger:hover { filter: brightness(1.1); }
  .btn-sm { font-size: 0.72rem; padding: 4px 10px; }

  /* ── Week nav ── */
  .week-nav {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .week-nav button { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--bark-mid); padding: 4px 8px; border-radius: 4px; }
  .week-nav button:hover { background: var(--border); }
  .week-label { font-family: 'Lora', serif; font-size: 1rem; font-weight: 500; flex: 1; }
  .week-label span { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--bark-lite); margin-left: 8px; font-weight: 400; }
  .today-btn { font-size: 0.75rem; padding: 4px 12px; background: none; border: 1px solid var(--border); color: var(--bark-mid); border-radius: 4px; cursor: pointer; }
  .today-btn:hover { background: var(--cream); }

  /* ── Grid ── */
  main { padding: 1.5rem 2rem 4rem; max-width: 960px; margin: 0 auto; }
  .schedule-grid {
    display: grid;
    grid-template-columns: 90px repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .grid-cell {
    background: var(--paper);
    padding: 10px 10px;
    min-height: 56px;
  }
  .grid-header {
    background: var(--bark);
    color: var(--cream);
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
  }
  .grid-header.today-col { background: var(--moss); }
  .grid-header .date-num { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; margin-top: 2px; }
  .grid-row-label {
    background: var(--cream);
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--bark-lite);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
  }
  .grid-row-label.row-header { background: var(--bark); }

  .walk-slot {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .walker-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 4px 9px;
    border-radius: 5px;
    cursor: pointer;
    transition: filter 0.1s;
    width: 100%;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .walker-chip:hover { filter: brightness(0.92); }
  .walker-chip.Dad    { background: var(--moss-lite);  color: var(--moss); }
  .walker-chip.Mom    { background: var(--sky-lite);   color: var(--sky); }
  .walker-chip.Josh   { background: var(--amber-lite); color: var(--amber); }
  .walker-chip.override { opacity: 0.55; text-decoration: line-through; }
  .walker-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .walker-chip.Dad  .chip-dot { background: var(--moss); }
  .walker-chip.Mom  .chip-dot { background: var(--sky); }
  .walker-chip.Josh .chip-dot { background: var(--amber); }
  .walker-chip.reassigned { font-style: italic; }
  .sub-chip {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--coral-lite);
    color: var(--coral);
    font-weight: 500;
    width: fit-content;
  }

  /* ── Override panel ── */
  .panel-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(61,43,31,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .panel-overlay.open { display: flex; }
  .panel {
    background: var(--paper);
    border-radius: 14px;
    padding: 2rem;
    width: min(480px, 95vw);
    box-shadow: 0 8px 40px rgba(61,43,31,0.25);
    position: relative;
  }
  .panel h2 { font-family: 'Lora', serif; font-size: 1.2rem; margin-bottom: 1.25rem; }
  .panel-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--bark-lite); }
  .form-row { margin-bottom: 1rem; }
  .form-row label { display: block; font-size: 0.78rem; font-weight: 500; margin-bottom: 5px; color: var(--bark-mid); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row select, .form-row input[type=date] {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--cream);
    color: var(--bark);
    outline: none;
  }
  .form-row select:focus, .form-row input:focus { border-color: var(--moss); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  #endDateRow { display: none; }

  /* ── Override list ── */
  .overrides-section { margin-top: 2rem; }
  .overrides-section h3 { font-family: 'Lora', serif; font-size: 1rem; margin-bottom: 0.75rem; color: var(--bark-mid); }
  .override-list { display: flex; flex-direction: column; gap: 6px; }
  .override-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 0.82rem;
  }
  .override-item .oi-walker { font-weight: 500; min-width: 36px; }
  .override-item .oi-desc { flex: 1; color: var(--bark-mid); }
  .override-item button { background: none; border: none; cursor: pointer; color: var(--coral); font-size: 0.75rem; font-weight: 500; }
  .empty-state { font-size: 0.82rem; color: var(--bark-lite); font-style: italic; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--bark-mid); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.Dad  { background: var(--moss); }
  .legend-dot.Mom  { background: var(--sky); }
  .legend-dot.Josh { background: var(--amber); }

  @media (max-width: 640px) {
    header { flex-direction: column; align-items: flex-start; }
    main { padding: 1rem 1rem 3rem; }
    .week-nav { padding: 0.6rem 1rem; }
    .schedule-grid { grid-template-columns: 60px repeat(7, 1fr); font-size: 0.7rem; }
    .walker-chip { font-size: 0.68rem; padding: 3px 6px; }
    .walker-chip .chip-dot { display: none; }
  }
  .clem-photo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 15%;
    border: 2.5px solid rgba(247,243,236,0.4);
    flex-shrink: 0;
  }
</style>
</head>

    <div class="legend-item"><div class="legend-dot Josh"></div> Josh</div>
  </div>
  <div class="schedule-grid" id="scheduleGrid"></div>
</main>

<!-- Add override panel -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanelIfOutside(event)">
  <div class="panel">
    <button class="panel-close" onclick="closePanel()">&times;</button>
    <h2>Mark someone unavailable</h2>
    <div class="form-row">
      <label>Walker</label>
      <select id="ovWalker">
        <option value="Dad">Dad</option>
        <option value="Mom">Mom</option>
        <option value="Josh">Josh</option>
      </select>
    </div>
    <div class="form-row">
      <label>Unavailable for</label>
      <select id="ovType" onchange="onTypeChange()">
        <option value="morning">Morning only</option>
        <option value="evening">Evening only</option>
        <option value="day">Full day</option>
        <option value="range">Date range (all day)</option>
      </select>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label id="startDateLabel">Date</label>
        <input type="date" id="ovStart">
      </div>
      <div class="form-row" id="endDateRow">
        <label>End date</label>
        <input type="date" id="ovEnd">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" style="color:var(--bark-mid);border-color:var(--border)" onclick="closePanel()">Cancel</button>
      <button class="btn btn-primary" onclick="addOverride()">Save override</button>
    </div>
  </div>
</div>

<!-- Override list panel -->
<div class="panel-overlay" id="listOverlay" onclick="closeListIfOutside(event)">
  <div class="panel">
    <button class="panel-close" onclick="closeList()">&times;</button>
    <h2>Active overrides</h2>
    <div id="overrideListContent"></div>
    <div class="form-actions" style="margin-top:1rem">
      <button class="btn btn-danger btn-sm" onclick="clearAllOverrides()">Clear all</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--bark-mid);border-color:var(--border)" onclick="closeList()">Close</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// BASE 3-WEEK ROTATION
// Index = day offset from cycle start (Mon wk1 = 0)
// Each entry: [morningWalker, eveningWalker]
// Dad never appears in morning slots.
// ─────────────────────────────────────────
const BASE_ROTATION = [
  // Week 1
  ['Mom',  'Dad'],   // Mon
  ['Josh', 'Mom'],   // Tue
  ['Mom',  'Josh'],  // Wed
  ['Josh', 'Dad'],   // Thu
  ['Mom',  'Josh'],  // Fri
  ['Josh', 'Mom'],   // Sat
  ['Mom',  'Dad'],   // Sun
  // Week 2
  ['Josh', 'Mom'],   // Mon
  ['Mom',  'Dad'],   // Tue
  ['Josh', 'Mom'],   // Wed
  ['Mom',  'Josh'],  // Thu
  ['Josh', 'Dad'],   // Fri
  ['Mom',  'Josh'],  // Sat
  ['Josh', 'Dad'],   // Sun
  // Week 3
  ['Mom',  'Josh'],  // Mon
  ['Josh', 'Dad'],   // Tue
  ['Mom',  'Dad'],   // Wed
  ['Josh', 'Mom'],   // Thu
  ['Mom',  'Josh'],  // Fri
  ['Josh', 'Mom'],   // Sat
  ['Mom',  'Dad'],   // Sun
];
const CYCLE_LEN = 21; // days

// Anchor: the Monday that cycle week 1 starts from.
// Using a fixed past Monday so the cycle is deterministic forever.
const CYCLE_ANCHOR = new Date('2025-01-06'); // a known Monday

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WALKERS = ['Dad','Mom','Josh'];
const MORNING_WALKERS = ['Mom','Josh'];

// ─────────────────────────────────────────
// DATE HELPERS
// ─────────────────────────────────────────
function toYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fromYMD(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}
function startOfWeek(d) {
  // Monday-based
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day;
  return addDays(d, diff);
}
function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

// ─────────────────────────────────────────
// SCHEDULE ENGINE
// ─────────────────────────────────────────
function baseSlot(date) {
  // Returns [morning, evening] walker names from base rotation
  const diff = daysBetween(CYCLE_ANCHOR, date);
  const idx = ((diff % CYCLE_LEN) + CYCLE_LEN) % CYCLE_LEN;
  return BASE_ROTATION[idx];
}

function getOverrides() {
  try { return JSON.parse(localStorage.getItem('clemOverrides') || '[]'); }
  catch { return []; }
}
function saveOverrides(arr) {
  localStorage.setItem('clemOverrides', JSON.stringify(arr));
}

function isAffected(override, dateStr, slot) {
  // slot: 'morning' or 'evening'
  const { type, startDate, endDate } = override;
  const inRange = dateStr >= startDate && dateStr <= (endDate || startDate);
  if (!inRange) return false;
  if (type === 'morning') return slot === 'morning';
  if (type === 'evening') return slot === 'evening';
  return true; // 'day' or 'range'
}

function computeSlot(date, slotName) {
  // Returns { walker, isOverridden, sub }
  const dateStr = toYMD(date);
  const [baseMorn, baseEve] = baseSlot(date);
  const base = slotName === 'morning' ? baseMorn : baseEve;
  const overrides = getOverrides();

  // Collect who is unavailable for this slot/date
  const unavailable = new Set();
  for (const ov of overrides) {
    if (ov.walker && isAffected(ov, dateStr, slotName)) {
      unavailable.add(ov.walker);
    }
  }

  if (!unavailable.has(base)) {
    return { walker: base, isOverridden: false, sub: null };
  }

  // Base walker is out — find a sub
  // Who is already walking this day in the other slot?
  const [baseMornSlot, baseEveSlot] = baseSlot(date);
  const otherSlotBase = slotName === 'morning' ? baseEveSlot : baseMornSlot;
  // Reassigned other slot
  const otherComputed = slotName === 'morning'
    ? computeEveOnly(date, unavailable, base)
    : computeMornOnly(date, unavailable, base);

  const alreadyWalking = new Set([otherComputed]);

  const pool = slotName === 'morning' ? MORNING_WALKERS : WALKERS;
  for (const w of pool) {
    if (!unavailable.has(w) && !alreadyWalking.has(w) && w !== base) {
      return { walker: w, isOverridden: true, sub: w };
    }
  }
  // Fallback: allow double-up if no one else available
  for (const w of pool) {
    if (!unavailable.has(w) && w !== base) {
      return { walker: w, isOverridden: true, sub: w };
    }
  }
  return { walker: '?', isOverridden: true, sub: null };
}

function computeMornOnly(date, unavailable, exclude) {
  const [baseMorn] = baseSlot(date);
  if (!unavailable.has(baseMorn) && baseMorn !== exclude) return baseMorn;
  for (const w of MORNING_WALKERS) {
    if (!unavailable.has(w) && w !== exclude) return w;
  }
  return baseMorn;
}
function computeEveOnly(date, unavailable, exclude) {
  const [, baseEve] = baseSlot(date);
  if (!unavailable.has(baseEve) && baseEve !== exclude) return baseEve;
  for (const w of WALKERS) {
    if (!unavailable.has(w) && w !== exclude) return w;
  }
  return baseEve;
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let currentWeekStart = startOfWeek(new Date());

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  renderWeekNav();
  renderGrid();
}

function renderWeekNav() {
  const end = addDays(currentWeekStart, 6);
  const startStr = `${currentWeekStart.getDate()} ${MONTHS[currentWeekStart.getMonth()]}`;
  const endStr   = `${end.getDate()} ${MONTHS[end.getMonth()]} ${end.getFullYear()}`;
  const diff = daysBetween(CYCLE_ANCHOR, currentWeekStart);
  const weekInCycle = (Math.floor(((diff % CYCLE_LEN)+CYCLE_LEN) % CYCLE_LEN / 7)) + 1;
  document.getElementById('weekLabel').innerHTML =
    `${startStr} – ${endStr} <span>cycle week ${weekInCycle} of 3</span>`;
}

function renderGrid() {
  const grid = document.getElementById('scheduleGrid');
  const today = toYMD(new Date());
  let html = '';

  // Top-left corner cell
  html += `<div class="grid-cell grid-header row-header"></div>`;

  // Day headers
  for (let i = 0; i < 7; i++) {
    const d = addDays(currentWeekStart, i);
    const ymd = toYMD(d);
    const isToday = ymd === today;
    html += `<div class="grid-cell grid-header${isToday?' today-col':''}">
      <span>${DAYS[d.getDay()]}</span>
      <span class="date-num">${d.getDate()}</span>
    </div>`;
  }

  // Morning row
  html += `<div class="grid-cell grid-row-label">AM</div>`;
  for (let i = 0; i < 7; i++) {
    const d = addDays(currentWeekStart, i);
    const { walker, isOverridden } = computeSlot(d, 'morning');
    html += `<div class="grid-cell">
      <div class="walk-slot">
        <button class="walker-chip ${walker}${isOverridden?' reassigned':''}"
          onclick="quickMark('${toYMD(d)}','morning')"
          title="Click to mark unavailable">
          <span class="chip-dot"></span>${walker}${isOverridden?' ↩':''}
        </button>
        ${isOverridden ? `<span class="sub-chip">cover</span>` : ''}
      </div>
    </div>`;
  }

  // Evening row
  html += `<div class="grid-cell grid-row-label">PM</div>`;
  for (let i = 0; i < 7; i++) {
    const d = addDays(currentWeekStart, i);
    const { walker, isOverridden } = computeSlot(d, 'evening');
    html += `<div class="grid-cell">
      <div class="walk-slot">
        <button class="walker-chip ${walker}${isOverridden?' reassigned':''}"
          onclick="quickMark('${toYMD(d)}','evening')"
          title="Click to mark unavailable">
          <span class="chip-dot"></span>${walker}${isOverridden?' ↩':''}
        </button>
        ${isOverridden ? `<span class="sub-chip">cover</span>` : ''}
      </div>
    </div>`;
  }

  grid.innerHTML = html;
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function shiftWeek(n) {
  currentWeekStart = addDays(currentWeekStart, n * 7);
  render();
}
function goToToday() {
  currentWeekStart = startOfWeek(new Date());
  render();
}

// ─────────────────────────────────────────
// OVERRIDE PANEL
// ─────────────────────────────────────────
function openPanel(prefillDate, prefillSlot) {
  const d = prefillDate || toYMD(new Date());
  document.getElementById('ovStart').value = d;
  document.getElementById('ovEnd').value = d;
  if (prefillSlot) {
    document.getElementById('ovType').value = prefillSlot;
    onTypeChange();
  }
  document.getElementById('panelOverlay').classList.add('open');
}
function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
}
function closePanelIfOutside(e) {
  if (e.target === document.getElementById('panelOverlay')) closePanel();
}
function onTypeChange() {
  const t = document.getElementById('ovType').value;
  document.getElementById('endDateRow').style.display = t === 'range' ? '' : 'none';
  document.getElementById('startDateLabel').textContent = t === 'range' ? 'Start date' : 'Date';
}
function quickMark(dateStr, slot) {
  openPanel(dateStr, slot);
  document.getElementById('ovWalker').value = computeSlot(fromYMD(dateStr), slot).walker;
}
function addOverride() {
  const walker = document.getElementById('ovWalker').value;
  const type   = document.getElementById('ovType').value;
  const start  = document.getElementById('ovStart').value;
  const end    = document.getElementById('ovEnd').value;
  if (!start) { alert('Please pick a date.'); return; }
  if (type === 'range' && end < start) { alert('End date must be after start date.'); return; }
  const overrides = getOverrides();
  overrides.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    walker, type,
    startDate: start,
    endDate: type === 'range' ? end : start
  });
  saveOverrides(overrides);
  closePanel();
  render();
}

// ─────────────────────────────────────────
// OVERRIDE LIST
// ─────────────────────────────────────────
function openOverrideList() {
  renderOverrideList();
  document.getElementById('listOverlay').classList.add('open');
}
function closeList() {
  document.getElementById('listOverlay').classList.remove('open');
}
function closeListIfOutside(e) {
  if (e.target === document.getElementById('listOverlay')) closeList();
}
function renderOverrideList() {
  const overrides = getOverrides();
  const el = document.getElementById('overrideListContent');
  if (!overrides.length) {
    el.innerHTML = `<p class="empty-state">No overrides set.</p>`;
    return;
  }
  const sorted = [...overrides].sort((a,b) => a.startDate.localeCompare(b.startDate));
  let html = '<div class="override-list">';
  for (const ov of sorted) {
    const typeLabel = { morning:'AM only', evening:'PM only', day:'Full day', range:'Date range' }[ov.type];
    const dateLabel = ov.type === 'range'
      ? `${ov.startDate} → ${ov.endDate}`
      : ov.startDate;
    html += `<div class="override-item">
      <span class="oi-walker ${ov.walker}" style="color:var(--${ov.walker==='Dad'?'moss':ov.walker==='Mom'?'sky':'amber'})">${ov.walker}</span>
      <span class="oi-desc">${typeLabel} &mdash; ${dateLabel}</span>
      <button onclick="removeOverride('${ov.id}')">Remove</button>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}
function removeOverride(id) {
  const overrides = getOverrides().filter(o => o.id !== id);
  saveOverrides(overrides);
  renderOverrideList();
  render();
}
function clearAllOverrides() {
  if (!confirm('Remove all overrides? The schedule will revert to the base rotation.')) return;
  saveOverrides([]);
  closeList();
  render();
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
// Pre-fill today's date on the override form
document.getElementById('ovStart').value = toYMD(new Date());
document.getElementById('ovEnd').value   = toYMD(new Date());
render();
</script>
</body>
</html>
